<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PiGrok App</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; }
        #input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #0084ff; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>PiGrok Interface</header>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="سول PiGrok...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            if (input.value.trim() !== "") {
                chatBox.innerHTML += `<p><b>أنت:</b> ${input.value}</p>`;
                // هنا غادي نربطو مستقبلاً بالـ API
                chatBox.innerHTML += `<p><b>PiGrok:</b> قيد التطوير...</p>`;
                input.value = "";
            }
        }
    </script>
</body>
</html>
